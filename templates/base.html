<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="csrf-token" content="{{ csrf_token() if csrf_token else '' }}">
    <title>{% block title %}个人AI理财助手{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- 自定义样式 -->
    <style>
        :root {
            --primary-color: #00d4ff;
            --primary-dark: #0099cc;
            --secondary-color: #6bcb77;
            --danger-color: #ff6b6b;
            --warning-color: #ffd93d;
            --dark-color: #1a1a2e;
            --light-color: #f5f7fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--light-color);
            color: var(--dark-color);
        }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 260px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            transition: all 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-header h3 { margin: 0; font-size: 1.3rem; }
        .sidebar-header p { margin: 5px 0 0; font-size: 0.75rem; opacity: 0.7; }
        
        .sidebar-nav { padding: 20px 0; }
        
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .sidebar-nav-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left: 3px solid var(--primary-color);
        }
        
        .sidebar-nav-item i { width: 24px; margin-right: 12px; font-size: 1.1rem; }
        
        /* 主内容区 */
        .main-content { margin-left: 260px; padding: 20px; min-height: 100vh; }
        
        /* 顶部栏 */
        .top-bar {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-title { font-size: 1.5rem; font-weight: 600; margin: 0; }
        .datetime { color: #666; font-size: 0.85rem; }
        
        /* 卡片 */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
            background: white;
        }
        
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .card-header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 15px 20px;
            font-weight: 600;
            border-radius: 12px 12px 0 0;
        }
        .card-body { padding: 20px; }
        
        /* 统计卡片 */
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            height: 100%;
            transition: transform 0.2s;
        }
        
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--dark-color); }
        .stat-card .stat-label { color: #666; font-size: 0.85rem; margin-top: 5px; }
        .stat-card .stat-trend { font-size: 0.75rem; margin-top: 5px; }
        .trend-up { color: var(--secondary-color); }
        .trend-down { color: var(--danger-color); }
        
        /* 表格 */
        .table-custom { width: 100%; border-collapse: collapse; }
        .table-custom th, .table-custom td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .table-custom th { background: #f8f9fa; font-weight: 600; }
        .table-custom tr:hover { background: #f8f9fa; }
        
        /* 标签 */
        .badge-high { background: var(--danger-color); color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; display: inline-block; }
        .badge-medium { background: var(--warning-color); color: #333; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; display: inline-block; }
        .badge-low { background: var(--secondary-color); color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; display: inline-block; }
        
        /* 按钮 */
        .btn-custom {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .btn-custom:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,212,255,0.3); color: white; }
        .btn-custom:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { left: -260px; }
            .sidebar.show { left: 0; }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block !important; }
            .stat-card .stat-value { font-size: 1.5rem; }
            .table-custom th, .table-custom td { padding: 8px 10px; font-size: 0.85rem; }
        }
        
        /* 工具类 */
        .text-primary-custom { color: var(--primary-color); }
        .bg-primary-custom { background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%); }
        .cursor-pointer { cursor: pointer; }
        .text-success { color: var(--secondary-color) !important; }
        .text-danger { color: var(--danger-color) !important; }
        .text-warning { color: var(--warning-color) !important; }
        
        /* 打印样式 */
        @media print {
            .sidebar, .top-bar, .btn-custom { display: none; }
            .main-content { margin-left: 0; padding: 0; }
            .card { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-robot"></i> AI理财助手</h3>
            <p>智能投资决策系统</p>
        </div>
        <div class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="sidebar-nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i> 仪表盘
            </a>
            <a href="{{ url_for('recommendations') }}" class="sidebar-nav-item {% if active_page == 'recommendations' %}active{% endif %}">
                <i class="fas fa-chart-line"></i> 投资推荐
            </a>
            <a href="{{ url_for('warnings') }}" class="sidebar-nav-item {% if active_page == 'warnings' %}active{% endif %}">
                <i class="fas fa-exclamation-triangle"></i> 风险预警
            </a>
            <a href="{{ url_for('reviews') }}" class="sidebar-nav-item {% if active_page == 'reviews' %}active{% endif %}">
                <i class="fas fa-history"></i> 复盘分析
            </a>
            <a href="{{ url_for('holdings') }}" class="sidebar-nav-item {% if active_page == 'holdings' %}active{% endif %}">
                <i class="fas fa-briefcase"></i> 持仓管理
            </a>
            <a href="{{ url_for('reflection') }}" class="sidebar-nav-item {% if active_page == 'reflection' %}active{% endif %}">
                <i class="fas fa-brain"></i> 反思报告
            </a>
            <a href="{{ url_for('config_page') }}" class="sidebar-nav-item {% if active_page == 'config' %}active{% endif %}">
                <i class="fas fa-cog"></i> 系统配置
            </a>
            <a href="{{ url_for('model_monitor') }}" class="sidebar-nav-item {% if active_page == 'model' %}active{% endif %}">
                <i class="fas fa-chart-line"></i> 模型监控
            </a>
            <a href="/data-management" class="sidebar-nav-item {% if active_page == 'data_management' %}active{% endif %}">
                <i class="fas fa-database"></i> 数据管理
            </a>
            <a href="{{ url_for('logs_page') }}" class="sidebar-nav-item {% if active_page == 'logs' %}active{% endif %}">
                <i class="fas fa-list-alt"></i> 系统日志
            </a>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-content">
        <div class="top-bar">
            <div>
                <i class="fas fa-bars menu-toggle" id="menuToggle" style="cursor: pointer; font-size: 1.2rem; display: none;"></i>
                <h4 class="page-title d-inline-block ms-2">{% block page_title %}仪表盘{% endblock %}</h4>
            </div>
            <div class="datetime" id="datetime"></div>
        </div>
        
        {% block content %}{% endblock %}
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 更新时间显示
        function updateDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('datetime').innerHTML = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // 菜单切换（移动端）
        document.getElementById('menuToggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('show');
        });
        
        // 点击其他地方关闭侧边栏
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                if (!e.target.closest('#sidebar') && !e.target.closest('#menuToggle')) {
                    document.getElementById('sidebar')?.classList.remove('show');
                }
            }
        });
        
        // 全局工具函数
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        function showToast(message, type) {
            const types = { success: 'success', error: 'danger', warning: 'warning', info: 'primary' };
            const toastHtml = `<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;"><div class="toast align-items-center text-white bg-${types[type] || 'primary'} border-0" role="alert"><div class="d-flex"><div class="toast-body">${escapeHtml(message)}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>`;
            $('body').append(toastHtml);
            const toast = new bootstrap.Toast($('.toast').last());
            toast.show();
            setTimeout(() => $('.toast').last().remove(), 3000);
        }
        
        window.escapeHtml = escapeHtml;
        window.showToast = showToast;
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
