{% extends "base.html" %}

{% block title %}系统配置 - 个人AI理财助手{% endblock %}
{% block page_title %}系统配置{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card">
        <div class="card-header"><ul class="nav nav-tabs card-header-tabs" id="configTabs" role="tablist"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pushConfig">推送配置</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#warningConfig">预警阈值</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#filterConfig">筛选规则</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#modelConfig">模型参数</button></li></ul></div>
        <div class="card-body">
            <div class="tab-content">
                <div class="tab-pane fade show active" id="pushConfig">
                    <form id="pushConfigForm"><div class="row"><div class="col-md-6"><div class="mb-3"><label class="form-label">邮件SMTP服务器</label><input type="text" class="form-control" name="email_smtp_server" placeholder="smtp.qq.com"></div><div class="mb-3"><label class="form-label">发件邮箱</label><input type="email" class="form-control" name="email_sender" placeholder="your_email@qq.com"></div><div class="mb-3"><label class="form-label">邮箱授权码</label><input type="password" class="form-control" name="email_password" placeholder="授权码"></div></div><div class="col-md-6"><div class="mb-3"><label class="form-label">收件邮箱</label><input type="email" class="form-control" name="email_receiver" placeholder="receiver@example.com"></div><div class="mb-3"><label class="form-label">微信SCKEY</label><input type="text" class="form-control" name="wechat_sckey" placeholder="SCKEY"></div><div class="mb-3"><button type="button" class="btn btn-outline-primary" id="testPushBtn">测试推送</button></div></div></div><div class="mt-3"><button type="submit" class="btn btn-custom">保存配置</button><button type="button" class="btn btn-outline-secondary" id="resetPushBtn">恢复默认</button></div></form>
                </div>
                <div class="tab-pane fade" id="warningConfig">
                    <form id="warningConfigForm"><div class="row"><div class="col-md-6"><div class="mb-3"><label class="form-label">RSI超买阈值</label><input type="number" class="form-control" name="rsi_overbought" step="1" min="50" max="100"><small class="text-muted">默认80</small></div><div class="mb-3"><label class="form-label">RSI超卖阈值</label><input type="number" class="form-control" name="rsi_oversold" step="1" min="0" max="50"><small class="text-muted">默认20</small></div><div class="mb-3"><label class="form-label">连续流出天数</label><input type="number" class="form-control" name="consecutive_outflow" step="1" min="1" max="10"><small class="text-muted">默认3</small></div></div><div class="col-md-6"><div class="mb-3"><label class="form-label">单资产集中度阈值</label><input type="number" class="form-control" name="single_asset_ratio" step="0.05" min="0" max="1"><small class="text-muted">默认0.2 (20%)</small></div><div class="mb-3"><label class="form-label">单日大跌阈值</label><input type="number" class="form-control" name="daily_drop_threshold" step="0.01" min="0" max="0.2"><small class="text-muted">默认0.05 (5%)</small></div><div class="mb-3"><label class="form-label">PE分位数高估阈值</label><input type="number" class="form-control" name="pe_percentile_high" step="1" min="50" max="100"><small class="text-muted">默认90</small></div></div></div><div class="mt-3"><button type="submit" class="btn btn-custom">保存配置</button><button type="button" class="btn btn-outline-secondary" id="resetWarningBtn">恢复默认</button></div></form>
                </div>
                <div class="tab-pane fade" id="filterConfig">
                    <form id="filterConfigForm"><div class="row"><div class="col-md-6"><div class="mb-3"><label class="form-label">A股最小市值(亿)</label><input type="number" class="form-control" name="min_market_cap_a" step="10" min="0"><small class="text-muted">默认50亿</small></div><div class="mb-3"><label class="form-label">港股最小市值(亿港元)</label><input type="number" class="form-control" name="min_market_cap_hk" step="10" min="0"><small class="text-muted">默认50亿港元</small></div><div class="mb-3"><label class="form-label">美股最小市值(亿美元)</label><input type="number" class="form-control" name="min_market_cap_us" step="1" min="0"><small class="text-muted">默认10亿美元</small></div></div><div class="col-md-6"><div class="mb-3"><label class="form-label">最大波动率</label><input type="number" class="form-control" name="max_volatility" step="0.05" min="0" max="1"><small class="text-muted">默认0.5 (50%)</small></div><div class="mb-3"><label class="form-label">最小基金规模(亿)</label><input type="number" class="form-control" name="min_fund_size" step="1" min="0"><small class="text-muted">默认2亿</small></div><div class="mb-3"><label class="form-label">最大管理费率(%)</label><input type="number" class="form-control" name="max_fund_fee" step="0.1" min="0" max="5"><small class="text-muted">默认1.5%</small></div></div></div><div class="mt-3"><button type="submit" class="btn btn-custom">保存配置</button><button type="button" class="btn btn-outline-secondary" id="resetFilterBtn">恢复默认</button></div></form>
                </div>
                <div class="tab-pane fade" id="modelConfig">
                    <form id="modelConfigForm"><div class="row"><div class="col-md-6"><div class="mb-3"><label class="form-label">XGBoost树数量</label><input type="number" class="form-control" name="n_estimators" step="50" min="50" max="1000"><small class="text-muted">默认200</small></div><div class="mb-3"><label class="form-label">XGBoost最大深度</label><input type="number" class="form-control" name="max_depth" step="1" min="1" max="15"><small class="text-muted">默认6</small></div><div class="mb-3"><label class="form-label">学习率</label><input type="number" class="form-control" name="learning_rate" step="0.01" min="0.01" max="0.5"><small class="text-muted">默认0.05</small></div></div><div class="col-md-6"><div class="mb-3"><label class="form-label">子采样比例</label><input type="number" class="form-control" name="subsample" step="0.05" min="0.5" max="1"><small class="text-muted">默认0.8</small></div><div class="mb-3"><label class="form-label">特征采样比例</label><input type="number" class="form-control" name="colsample_bytree" step="0.05" min="0.5" max="1"><small class="text-muted">默认0.8</small></div><div class="mb-3"><div class="form-check"><input type="checkbox" class="form-check-input" name="lstm_enabled"><label class="form-check-label">启用LSTM模型</label><small class="text-muted d-block">启用后需要更多计算资源</small></div></div></div></div><div class="mt-3"><button type="submit" class="btn btn-custom">保存配置</button><button type="button" class="btn btn-outline-secondary" id="resetModelBtn">恢复默认</button></div></form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function loadConfig() {
    $.ajax({ url: '/api/config', method: 'GET', success: function(r) {
        if (r.code===200 && r.data) {
            const d = r.data;
            if (d.push) { $('[name="email_smtp_server"]').val(d.push.email_smtp_server||''); $('[name="email_sender"]').val(d.push.email_sender||''); $('[name="email_receiver"]').val(d.push.email_receiver||''); $('[name="wechat_sckey"]').val(d.push.wechat_sckey||''); }
            if (d.warning) { $('[name="rsi_overbought"]').val(d.warning.rsi_overbought||80); $('[name="rsi_oversold"]').val(d.warning.rsi_oversold||20); $('[name="consecutive_outflow"]').val(d.warning.consecutive_outflow||3); $('[name="single_asset_ratio"]').val(d.warning.single_asset_ratio||0.2); $('[name="daily_drop_threshold"]').val(d.warning.daily_drop_threshold||0.05); $('[name="pe_percentile_high"]').val(d.warning.pe_percentile_high||90); }
            if (d.filter) { $('[name="min_market_cap_a"]').val((d.filter.min_market_cap_a||5000000000)/100000000); $('[name="min_market_cap_hk"]').val((d.filter.min_market_cap_hk||5000000000)/100000000); $('[name="min_market_cap_us"]').val((d.filter.min_market_cap_us||1000000000)/100000000); $('[name="max_volatility"]').val(d.filter.max_volatility||0.5); $('[name="min_fund_size"]').val((d.filter.min_fund_size||200000000)/100000000); $('[name="max_fund_fee"]').val(d.filter.max_fund_fee||1.5); }
            if (d.model) { $('[name="n_estimators"]').val(d.model.n_estimators||200); $('[name="max_depth"]').val(d.model.max_depth||6); $('[name="learning_rate"]').val(d.model.learning_rate||0.05); $('[name="subsample"]').val(d.model.subsample||0.8); $('[name="colsample_bytree"]').val(d.model.colsample_bytree||0.8); $('[name="lstm_enabled"]').prop('checked', d.model.lstm_enabled||false); }
        }
    } });
}

$('#pushConfigForm').on('submit', function(e) { e.preventDefault(); $.ajax({ url: '/api/config', method: 'POST', contentType: 'application/json', data: JSON.stringify({ push: { email_smtp_server: $('[name="email_smtp_server"]').val(), email_sender: $('[name="email_sender"]').val(), email_password: $('[name="email_password"]').val(), email_receiver: $('[name="email_receiver"]').val(), wechat_sckey: $('[name="wechat_sckey"]').val() } }), success: function(r) { if (r.code===200) showToast('保存成功', 'success'); else showToast('保存失败: '+r.message, 'error'); } }); });
$('#warningConfigForm').on('submit', function(e) { e.preventDefault(); $.ajax({ url: '/api/config', method: 'POST', contentType: 'application/json', data: JSON.stringify({ warning: { rsi_overbought: parseFloat($('[name="rsi_overbought"]').val()), rsi_oversold: parseFloat($('[name="rsi_oversold"]').val()), consecutive_outflow: parseInt($('[name="consecutive_outflow"]').val()), single_asset_ratio: parseFloat($('[name="single_asset_ratio"]').val()), daily_drop_threshold: parseFloat($('[name="daily_drop_threshold"]').val()), pe_percentile_high: parseFloat($('[name="pe_percentile_high"]').val()) } }), success: function(r) { if (r.code===200) showToast('保存成功', 'success'); else showToast('保存失败: '+r.message, 'error'); } }); });
$('#testPushBtn').on('click', function() { $.ajax({ url: '/api/config/test_push', method: 'POST', success: function(r) { if (r.code===200) showToast('测试推送已发送，请检查邮箱/微信', 'success'); else showToast('推送失败: '+r.message, 'error'); } }); });
$('#resetPushBtn, #resetWarningBtn, #resetFilterBtn, #resetModelBtn').on('click', function() { if (confirm('确定恢复默认配置吗？')) location.reload(); });

$(document).ready(function() { loadConfig(); });
</script>
{% endblock %}
